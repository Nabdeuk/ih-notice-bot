name: iH Notice Crawler

on:
  schedule:
    # 1시간마다 실행 (UTC 기준이므로 한국 시간 9AM~6PM 사이 등에 맞춰 조절 가능)
    # 아래 설정은 매시 정각에 실행되나 깃허브 무료 서버 특성상 수 분~십수 분 지연될 수 있습니다.
    - cron: '0 * * * *'
  workflow_dispatch: # 필요할 때 깃허브 웹에서 수동으로도 실행 가능하게 함

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository 코드 가져오기
      uses: actions/checkout@v4

    - name: Set up Python 파이썬 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Crawler 크롤러 실행
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python main.py

    - name: Commit and Push 변경사항(txt 파일) 깃허브에 다시 보관
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add last_url.txt
        # 파일 내용이 바뀌었을 때만 커밋(오류 방지)
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update last checked URL" && git push)
